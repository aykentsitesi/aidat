<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aykent Aidat Panel - Yönetim</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #3f0f5c 50%, #0f172a 100%);
      min-height: 100vh;
      color: #e5e7eb;
    }

    /* Header */
    .header {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(168, 85, 247, 0.2);
      padding: 24px 0;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 28px;
      font-weight: bold;
      color: white;
      margin-bottom: 8px;
    }

    .header p {
      color: #d1d5db;
      font-size: 14px;
    }

    .version-badge {
      display: inline-block;
      padding: 8px 16px;
      background: rgba(168, 85, 247, 0.15);
      border: 1px solid rgba(168, 85, 247, 0.4);
      border-radius: 8px;
      font-size: 12px;
      color: #d1d5db;
    }

    /* Main Content */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 16px;
    }

    /* URL Input */
    .url-section {
      border-bottom: 1px solid rgba(168, 85, 247, 0.15);
      background: rgba(30, 27, 75, 0.3);
      backdrop-filter: blur(10px);
      margin-bottom: 32px;
      padding: 20px 0;
    }

    .url-toggle {
      background: none;
      border: none;
      color: #c4b5fd;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      transition: color 0.2s;
    }

    .url-toggle:hover {
      color: #ddd6fe;
    }

    .chevron {
      display: inline-block;
      width: 16px;
      height: 16px;
      transition: transform 0.3s;
    }

    .chevron.open {
      transform: rotate(90deg);
    }

    .url-input-container {
      display: none;
      background: rgba(15, 23, 42, 0.5);
      padding: 16px;
      border-radius: 8px;
      border: 1px solid rgba(168, 85, 247, 0.15);
    }

    .url-input-container.visible {
      display: block;
    }

    .url-input-container input {
      width: 100%;
      padding: 10px 16px;
      background: #1e1b4b;
      color: white;
      border: 1px solid rgba(168, 85, 247, 0.25);
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Monaco', 'Courier New', monospace;
    }

    .url-input-container input:focus {
      outline: none;
      border-color: #a855f7;
      background: #2e1b4b;
    }

    .url-help {
      font-size: 11px;
      color: #6b7280;
      margin-top: 8px;
    }

    /* Alert Box */
    .alert {
      margin-bottom: 24px;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid;
      display: flex;
      gap: 12px;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .alert.success {
      background: rgba(34, 197, 94, 0.1);
      border-color: rgba(34, 197, 94, 0.3);
      color: #86efac;
    }

    .alert.error {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .alert-icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      margin-top: 2px;
    }

    .alert-content h3 {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .alert-content p {
      font-size: 13px;
      white-space: pre-wrap;
    }

    /* Groups */
    .group {
      margin-bottom: 32px;
    }

    .group-title {
      font-size: 16px;
      font-weight: bold;
      color: white;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(168, 85, 247, 0.2);
    }

    /* Buttons Grid */
    .buttons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }

    .btn {
      padding: 16px 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }

    .btn:hover:not(:disabled) {
      opacity: 0.9;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
    }

    .btn:active:not(:disabled) {
      transform: scale(0.95);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn.bg-purple { background-color: #9333ea; }
    .btn.bg-green { background-color: #22c55e; }
    .btn.bg-blue { background-color: #3b82f6; }
    .btn.bg-indigo { background-color: #6366f1; }
    .btn.bg-emerald { background-color: #10b981; }
    .btn.bg-cyan { background-color: #06b6d4; }
    .btn.bg-red { background-color: #ef4444; }
    .btn.bg-orange { background-color: #f97316; }
    .btn.bg-yellow { background-color: #eab308; }
    .btn.bg-amber { background-color: #f59e0b; }
    .btn.bg-rose { background-color: #f43f5e; }
    .btn.bg-slate { background-color: #64748b; }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Footer */
    .footer {
      margin-top: 48px;
      padding: 24px;
      background: rgba(30, 27, 75, 0.2);
      border: 1px solid rgba(168, 85, 247, 0.15);
      border-radius: 8px;
      text-align: center;
      color: #9ca3af;
      font-size: 13px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header h1 {
        font-size: 22px;
      }

      .header-content {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .buttons-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container">
      <div class="header-content">
        <div>
          <h1>🏢 Aykent Aidat Panel</h1>
          <p>Yönetim Kontrol Paneli</p>
        </div>
        <div class="version-badge">v3.9.0</div>
      </div>
    </div>
  </header>

  <!-- URL Input Section -->
  <div class="url-section">
    <div class="container">
      <button class="url-toggle" id="urlToggle">
        <span class="chevron" id="chevron">›</span>
        Apps Script Web App URL (İsteğe Bağlı)
      </button>
      <div class="url-input-container" id="urlContainer">
        <input 
          type="text" 
          id="scriptUrl" 
          placeholder="https://script.google.com/macros/d/DEPLOYMENT_ID/usercallback"
        />
        <div class="url-help">
          💡 AYARLAR sekmesi → APPS_SCRIPT_URL sütunundan kopyalayın
        </div>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main class="container">
    <!-- Alert -->
    <div id="alert" style="display: none;"></div>

    <!-- Grupos de Funções -->
    <div id="functions"></div>

    <!-- Footer -->
    <div class="footer">
      <p>📋 Tüm işlemler Google Sheets ve Apps Script üzerinde çalışır</p>
      <p>⚠️ Büyük veri işlemleri biraz zaman alabilir</p>
    </div>
  </main>

  <script>
    const functions = [
      {
        grup: '⚙️ AYARLAR',
        butonlar: [
          { label: '🔧 AYARLAR Sekmesi', func: 'ayarlarSekmesiniOlustur', renk: 'bg-purple' }
        ]
      },
      {
        grup: '💰 MALİ TAKİP',
        butonlar: [
          { label: '💰 Mali Tabloyu Güncelle', func: 'maliTablosunuGuncelle', renk: 'bg-green' },
          { label: '✅ Devir Doğrulama', func: 'devirDogrulamaRaporuGoster', renk: 'bg-blue' }
        ]
      },
      {
        grup: '👁️ ZİYARET TAKİP',
        butonlar: [
          { label: '👁️ Ziyaret Takip Paneli', func: 'ziyaretTakipPaneliniGuncelle', renk: 'bg-indigo' }
        ]
      },
      {
        grup: '📱 WHATSAPP',
        butonlar: [
          { label: '📱 WhatsApp Linklerini Oluştur', func: 'whatsappLinkleriniOlustur', renk: 'bg-emerald' }
        ]
      },
      {
        grup: '📊 LOG & RAPOR',
        butonlar: [
          { label: '📊 Log Özet Dashboard', func: 'logOzetDashboardOlustur', renk: 'bg-cyan' },
          { label: '🗑️ Log Temizle', func: 'logKayitlariniTemizle', renk: 'bg-red' },
          { label: '📋 Log Sayısı', func: 'logKontrolEt', renk: 'bg-orange' }
        ]
      },
      {
        grup: '🔄 CACHE & BAKIM',
        butonlar: [
          { label: '🔄 Önbelleği Temizle', func: 'cacheTumunuTemizle', renk: 'bg-yellow' },
          { label: '🧹 JSON Kalıntılarını Temizle', func: 'jsonHazirVeriKalintilariniTemizle', renk: 'bg-amber' }
        ]
      },
      {
        grup: '🔥 SUNUCU ISITMASI',
        butonlar: [
          { label: '🔥 Sunucu Isıtma Kur', func: 'sunucuIsitmaTriggerKur', renk: 'bg-rose' },
          { label: '🧊 Sunucu Isıtma Kaldır', func: 'sunucuIsitmaTriggerKaldir', renk: 'bg-slate' }
        ]
      }
    ];

    let loading = false;

    // URL Toggle
    document.getElementById('urlToggle').addEventListener('click', () => {
      const container = document.getElementById('urlContainer');
      const chevron = document.getElementById('chevron');
      container.classList.toggle('visible');
      chevron.classList.toggle('open');
    });

    // Render Functions
    const functionsHtml = functions.map(group => `
      <div class="group">
        <h2 class="group-title">${group.grup}</h2>
        <div class="buttons-grid">
          ${group.butonlar.map(btn => `
            <button class="btn ${btn.renk}" onclick="callFunction('${btn.func}')">
              <span id="spinner-${btn.func}"></span>
              ${btn.label}
            </button>
          `).join('')}
        </div>
      </div>
    `).join('');

    document.getElementById('functions').innerHTML = functionsHtml;

    // Call Function
    async function callFunction(funcName) {
      if (loading) return;

      const scriptUrl = document.getElementById('scriptUrl').value;
      
      if (!scriptUrl) {
        showAlert('error', '⚠️ URL Gerekli', 'Lütfen Apps Script Web App URL\'sini girin.');
        return;
      }

      loading = true;
      const spinner = document.getElementById(`spinner-${funcName}`);
      if (spinner) spinner.innerHTML = '<span class="spinner"></span>';

      try {
        // Google Apps Script'e istek gönder
        const response = await fetch(scriptUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ func: funcName })
        });

        const data = await response.json();

        showAlert(
          'success',
          `✅ ${funcName}`,
          data.message || 'İşlem tamamlandı!'
        );
      } catch (error) {
        showAlert(
          'error',
          '❌ Hata',
          error.message || 'Beklenmeyen bir hata oluştu.\n\nURL\'yi kontrol edin.'
        );
      } finally {
        loading = false;
        if (spinner) spinner.innerHTML = '';
      }
    }

    // Show Alert
    function showAlert(type, title, message) {
      const alert = document.getElementById('alert');
      const icon = type === 'success' ? '✓' : '!';
      
      alert.className = `alert ${type}`;
      alert.innerHTML = `
        <div class="alert-icon">${icon}</div>
        <div class="alert-content">
          <h3>${title}</h3>
          <p>${message}</p>
        </div>
      `;
      alert.style.display = 'flex';

      // Auto hide after 6 seconds
      setTimeout(() => {
        alert.style.display = 'none';
      }, 6000);
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aykent Aidat Panel - Yönetim</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #3f0f5c 50%, #0f172a 100%);
      min-height: 100vh;
      color: #e5e7eb;
    }

    .header {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(168, 85, 247, 0.2);
      padding: 24px 0;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 28px;
      font-weight: bold;
      color: white;
      margin-bottom: 8px;
    }

    .header p {
      color: #d1d5db;
      font-size: 14px;
    }

    .version-badge {
      display: inline-block;
      padding: 8px 16px;
      background: rgba(168, 85, 247, 0.15);
      border: 1px solid rgba(168, 85, 247, 0.4);
      border-radius: 8px;
      font-size: 12px;
      color: #d1d5db;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 16px;
    }

    .alert {
      margin-bottom: 24px;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid;
      display: flex;
      gap: 12px;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .alert.success {
      background: rgba(34, 197, 94, 0.1);
      border-color: rgba(34, 197, 94, 0.3);
      color: #86efac;
    }

    .alert.error {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .alert-icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      margin-top: 2px;
    }

    .alert-content h3 {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .alert-content p {
      font-size: 13px;
      white-space: pre-wrap;
    }

    .group {
      margin-bottom: 32px;
    }

    .group-title {
      font-size: 16px;
      font-weight: bold;
      color: white;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(168, 85, 247, 0.2);
    }

    .buttons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }

    .btn {
      padding: 16px 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }

    .btn:hover:not(:disabled) {
      opacity: 0.9;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
    }

    .btn:active:not(:disabled) {
      transform: scale(0.95);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn.bg-purple { background-color: #9333ea; }
    .btn.bg-green { background-color: #22c55e; }
    .btn.bg-blue { background-color: #3b82f6; }
    .btn.bg-indigo { background-color: #6366f1; }
    .btn.bg-emerald { background-color: #10b981; }
    .btn.bg-cyan { background-color: #06b6d4; }
    .btn.bg-red { background-color: #ef4444; }
    .btn.bg-orange { background-color: #f97316; }
    .btn.bg-yellow { background-color: #eab308; }
    .btn.bg-amber { background-color: #f59e0b; }
    .btn.bg-rose { background-color: #f43f5e; }
    .btn.bg-slate { background-color: #64748b; }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer {
      margin-top: 48px;
      padding: 24px;
      background: rgba(30, 27, 75, 0.2);
      border: 1px solid rgba(168, 85, 247, 0.15);
      border-radius: 8px;
      text-align: center;
      color: #9ca3af;
      font-size: 13px;
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 22px;
      }

      .header-content {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .buttons-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-content">
        <div>
          <h1>🏢 Aykent Aidat Panel</h1>
          <p>Yönetim Kontrol Paneli</p>
        </div>
        <div class="version-badge">
